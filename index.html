<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rina's Fit — Multi-Tenant Tailoring Platform</title>
    <meta name="description" content="Rina's Fit is a modern multi-tenant SaaS platform for tailoring and fashion businesses to manage customers, measurements, and designs." />
    <meta name="author" content="Rina's Fit" />

    <meta property="og:title" content="Rina's Fit — Tailoring Management Platform" />
    <meta property="og:description" content="Manage your fashion business with Rina's Fit. Customers, measurements, designs — all in one place." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@rinasfit" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <link rel="canonical" href="https://rinasfit.com" />

    <!-- Fonts: preconnect first, then stylesheet (non-blocking) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Prevent flash of wrong theme: runs before React mounts -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem("rf-theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (s === "dark" || (!s && prefersDark)) {
            document.documentElement.classList.add("dark");
          }
        } catch (_) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
