<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Google Site Verification -->
    <meta
      name="google-site-verification"
      content="EhUaPiRl4wHn7uc_b9S8l__2-L_X2vbOdQW_CXjI7_U"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Rina's Fit - Multi-Tenant Tailoring Platform</title>

    <meta
      name="description"
      content="Rina's Fit is a modern multi-tenant SaaS platform for tailoring and fashion businesses to manage customers, measurements, and designs."
    />
    <meta name="author" content="Rina's Fit" />

    <!-- Open Graph -->
    <meta property="og:title" content="Rina's Fit - Tailoring Management Platform" />
    <meta
      property="og:description"
      content="Manage your fashion business with Rina's Fit. Customers, measurements, designs - all in one place."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://rinasfit.com" />

    <!-- Favicons (single source of truth) -->
    <link rel="icon" href="/favicon.ico?v=2" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Theme bootstrap (runs before React) -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem("rf-theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (s === "dark" || (!s && prefersDark)) {
            document.documentElement.classList.add("dark");
          }
        } catch (_) {}
      })();
    </script>
  </head>

  <body>
    <!-- Boot loader prevents blank black screen -->
    <div id="root">
      <style>
        #boot-loader {
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #0f0f0f;
          color: #ffffff;
          font-family: system-ui, -apple-system, sans-serif;
        }
      </style>
      <div id="boot-loader">Loading Rina’s Fit…</div>
    </div>

    <!-- Force reload when restored from bfcache -->
    <script>
      window.addEventListener("pageshow", function (event) {
        if (event.persisted) {
          window.location.reload();
        }
      });
    </script>

    <!-- React entry -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
